{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
	<nav aria-label="breadcrumb">
		<ol class="breadcrumb">
			<li class="breadcrumb-item"><a href="{% url 'index' %}">Forms</a></li>
			<li class="breadcrumb-item active" aria-current="page">Product management</li>
		</ol>
	</nav>
	{% for product in products %}
		<div class="col-md-7">
			<div class="card rounded-3 shadow-5 mb-4">
				<div class="card-body p-4">
					<div class="row d-flex justify-content-between align-items-center">
						<div class="col-md-2 col-lg-2 col-xl-2">
							<img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-shopping-carts/img1.webp"
								class="img-fluid rounded-3" alt="Cotton T-shirt">
						</div>
						<div class="col-md-3 col-lg-3 col-xl-3">
							<p id="product-name" product-name="{{product.product_name}}" class="lead fw-normal mb-2">{{product.product_name}}</p>
							<p><span class="text-muted">Size: </span>M <span class="text-muted">Color: </span>Grey</p>
						</div>
						<div class="col-md-3 col-lg-3 col-xl-2 d-flex">
							<button id="decrement-button" product-id="{{product.id}}" class="btn btn-link px-2" onclick="this.parentNode.querySelector('input[type=number]').stepDown()">
								<i class="fas fa-minus"></i>
							</button>
	
							<input min="0" name="quantity" value="{{product.quantity}}" type="number"
								class="form-control form-control-sm" />
	
							<button id="increment-button" product-id="{{product.id}}" class="btn btn-link px-2" onclick="this.parentNode.querySelector('input[type=number]').stepUp()">
								<i class="fas fa-plus"></i>
							</button>
						</div>
						<div class="col-md-3 col-lg-2 col-xl-2 offset-lg-1">
							<h5 class="mb-0">$499.00</h5>
						</div>
						<div class="col-md-1 col-lg-1 col-xl-1 text-end">
							<a id="x-button-delete" product-id="{{product.id}}" role="button" class="text-danger"><i
									class="fas fa-xmark fa-lg"></i></i></a>
						</div>
					</div>
				</div>
			</div>
		</div>
	{% endfor %}
</div>
{% endblock %}

{% block javascript %}
<script>
	(function () {
		console.log("ready")

		// x-button-DELETE
		const xButtons = document.querySelectorAll("#x-button-delete");
		xButtons.forEach((xButton) => {
			const productId = xButton.getAttribute("product-id");
			const productCard = xButton.closest(".card");
			xButton.addEventListener("click", (e) => {
				e.preventDefault();
				const deleteUrl = `/put_delete_product/${productId}`;
				deleteProduct(deleteUrl);
				productCard.remove();
			});
		});

		// PUT increase-quantity-button
		const incrementButtons = document.querySelectorAll("#increment-button");
		incrementButtons.forEach((incrementButton) => {
			incrementButton.addEventListener("click", (e) => {
				e.preventDefault();
				const productId = incrementButton.getAttribute("product-id");
				const quantityElement = incrementButton.parentElement.querySelector(".form-control");
				const productName = document.querySelector("#product-name");
				const formData = {
					product_name: productName.getAttribute("product-name"),
					quantity: parseInt(quantityElement.getAttribute("value")) + 1,
				}
				const putUrl = `/put_delete_product/${productId}`;
				updateProduct(putUrl, formData);
			});
		});

		// PUT decrease-quantity-button
		const decrementButtons = document.querySelectorAll("#decrement-button");
		decrementButtons.forEach((decrementButton) => {
			decrementButton.addEventListener("click", (e) => {
				e.preventDefault();
				const productId = decrementButton.getAttribute("product-id");
				const quantityElement = decrementButton.parentElement.querySelector(".form-control");
				const productName = document.querySelector("#product-name");
				const formData = {
					product_name: productName.getAttribute("product-name"),
					quantity: parseInt(quantityElement.getAttribute("value")) - 1,
				}
				const putUrl = `/put_delete_product/${productId}`;
				updateProduct(putUrl, formData);
			});
		});
	})();
</script>
{% endblock %}
